<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>ReviewIQ — Promo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000000;
        font-family: "Inter", sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="32"
      data-width="1920"
      data-height="1080"
    >
      <!-- Voiceover audio track (ElevenLabs V3 — Brian) -->
      <audio
        id="narration"
        class="clip"
        src="assets/voiceover.mp3"
        data-start="0"
        data-duration="32"
        data-track-index="0"
        data-volume="1"
      ></audio>

      <!-- Scene 1: Hook — Three hours of searching -->
      <div
        class="scene clip"
        data-composition-id="scene1-hook"
        data-composition-src="compositions/scene1-hook.html"
        data-start="0"
        data-duration="3"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 2: 47 tabs -->
      <div
        class="scene clip"
        data-composition-id="scene2-tabs"
        data-composition-src="compositions/scene2-tabs.html"
        data-start="3"
        data-duration="3"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 3: Sponsored reveal -->
      <div
        class="scene clip"
        data-composition-id="scene3-sponsored"
        data-composition-src="compositions/scene3-sponsored.html"
        data-start="6"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 4: Enough. (whispered) -->
      <div
        class="scene clip"
        data-composition-id="scene4-enough"
        data-composition-src="compositions/scene4-enough.html"
        data-start="11"
        data-duration="3"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 5: Logo reveal -->
      <div
        class="scene clip"
        data-composition-id="scene5-logo"
        data-composition-src="compositions/scene5-logo.html"
        data-start="14"
        data-duration="3"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 6: SmartScore product card -->
      <div
        class="scene clip"
        data-composition-id="scene6-smartscore"
        data-composition-src="compositions/scene6-smartscore.html"
        data-start="17"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 7: ICP grid -->
      <div
        class="scene clip"
        data-composition-id="scene7-icps"
        data-composition-src="compositions/scene7-icps.html"
        data-start="22"
        data-duration="4"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 8: Zero affiliate links -->
      <div
        class="scene clip"
        data-composition-id="scene8-no-affiliate"
        data-composition-src="compositions/scene8-no-affiliate.html"
        data-start="26"
        data-duration="2"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 9: CTA -->
      <div
        class="scene clip"
        data-composition-id="scene9-cta"
        data-composition-src="compositions/scene9-cta.html"
        data-start="28"
        data-duration="4"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
