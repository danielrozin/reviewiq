<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=block" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px;
      }
      .rows {
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 1200px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 32px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
      }
      .row-left { display: flex; align-items: center; gap: 20px; }
      .favicon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #334155, #1e293b);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: #94a3b8;
        font-size: 22px;
      }
      .name {
        font-size: 32px;
        font-weight: 600;
        color: #fff;
      }
      .headline {
        font-size: 20px;
        color: #94a3b8;
        margin-left: 12px;
      }
      .stamp {
        padding: 8px 18px;
        background: #ef4444;
        color: #fff;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.15em;
        border-radius: 6px;
        text-transform: uppercase;
        transform: rotate(-8deg) scale(0.5);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="scene3-sponsored" data-start="0" data-duration="5" data-width="1920" data-height="1080">
      <div class="wrap">
        <div class="rows clip" id="rows" data-start="0" data-duration="5" data-track-index="1"></div>
      </div>
    </div>

    <script>
      (function () {
        const SITES = [
          ["T", "TopPicks.io"],
          ["R", "ReviewHub"],
          ["B", "BestGearDaily"],
          ["G", "GadgetGuide Pro"],
          ["V", "VacuumAdvisor"],
          ["B", "BuyerBeacon"],
        ];
        const rowsEl = document.querySelector("#rows");

        SITES.forEach(([initial, name]) => {
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML = `
            <div class="row-left">
              <div class="favicon">${initial}</div>
              <div class="name">${name}</div>
              <div class="headline">"Our #1 pick: Roborock S8"</div>
            </div>
            <div class="stamp">Sponsored</div>
          `;
          rowsEl.appendChild(row);
        });

        const tl = gsap.timeline({ paused: true });
        const rows = rowsEl.querySelectorAll(".row");

        // Rows slide in
        rows.forEach((row, i) => {
          gsap.set(row, { opacity: 0, x: -60 });
          tl.to(row, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, i * 0.15);
        });

        // Stamps appear after all rows settle
        const stamps = rowsEl.querySelectorAll(".stamp");
        stamps.forEach((stamp, i) => {
          tl.to(stamp, {
            opacity: 1,
            scale: 1,
            duration: 0.35,
            ease: "back.out(3)",
          }, 2.0 + i * 0.15);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["scene3-sponsored"] = tl;
      })();
    </script>
  </body>
</html>
