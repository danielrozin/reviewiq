<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;800&display=block" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
      }
      .wrap {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .glow {
        position: absolute;
        width: 1200px;
        height: 1200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0, 95, 212, 0.25) 0%, transparent 60%);
        filter: blur(40px);
        opacity: 0;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 32px;
        position: relative;
        z-index: 1;
      }
      .logo-mark {
        width: 200px;
        height: 200px;
        border-radius: 46px;
        background: #005fd4;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .logo-mark svg { position: absolute; }
      .logo-text {
        font-size: 108px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.03em;
      }
      .logo-text .iq { color: #005fd4; }
      .subtext {
        position: relative;
        z-index: 1;
        margin-top: 40px;
        font-size: 34px;
        font-weight: 500;
        color: #94a3b8;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="scene5-logo" data-start="0" data-duration="3" data-width="1920" data-height="1080">
      <div class="wrap">
        <div class="glow clip" id="glow" data-start="0" data-duration="3" data-track-index="1"></div>
        <div class="logo clip" id="logo" data-start="0" data-duration="3" data-track-index="2">
          <div class="logo-mark">
            <svg width="200" height="200" viewBox="0 0 120 120" fill="none">
              <circle cx="60" cy="60" r="46" stroke="#ffffff" stroke-width="4" stroke-opacity="0.3" fill="none" />
              <path d="M42 58 L54 70 L80 44" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <div class="logo-text">Review<span class="iq">IQ</span></div>
        </div>
        <div class="subtext clip" id="subtext" data-start="0" data-duration="3" data-track-index="3">
          AI-Powered Buyer Intelligence
        </div>
      </div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const glow = document.querySelector("#glow");
        const logo = document.querySelector("#logo");
        const subtext = document.querySelector("#subtext");

        gsap.set(glow, { opacity: 0 });
        gsap.set(logo, { opacity: 0, scale: 0.6 });
        gsap.set(subtext, { opacity: 0, y: 10 });

        tl.to(glow, { opacity: 1, duration: 1.2, ease: "power2.out" }, 0);
        tl.to(logo, { opacity: 1, scale: 1, duration: 0.7, ease: "back.out(1.4)" }, 0.2);
        tl.to(subtext, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.2);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene5-logo"] = tl;
      })();
    </script>
  </body>
</html>
