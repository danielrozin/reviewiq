<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;800;900&display=block" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stamp-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }
      .big-zero {
        border: 10px solid #ef4444;
        padding: 24px 60px;
        font-size: 160px;
        font-weight: 900;
        color: #ef4444;
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .label {
        font-size: 48px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .sub {
        font-size: 26px;
        font-weight: 500;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="scene8-no-affiliate" data-start="0" data-duration="2" data-width="1920" data-height="1080">
      <div class="wrap">
        <div class="stamp-block clip" id="stamp" data-start="0" data-duration="2" data-track-index="1">
          <div class="big-zero">0</div>
          <div class="label">Affiliate Links</div>
          <div class="sub">No compromises. Ever.</div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const stamp = document.querySelector("#stamp");

        gsap.set(stamp, { opacity: 0, scale: 2.5, rotation: -4 });
        tl.to(stamp, {
          opacity: 1,
          scale: 1,
          rotation: -4,
          duration: 0.5,
          ease: "back.out(2.5)",
        }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene8-no-affiliate"] = tl;
      })();
    </script>
  </body>
</html>
