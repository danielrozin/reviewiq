<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=block" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 80px;
      }
      .heading {
        font-size: 64px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.02em;
        text-align: center;
      }
      .heading .accent { color: #0a7cff; }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 32px;
        width: 1600px;
      }
      .tile {
        padding: 40px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .tile-label {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        text-align: center;
      }
      .tile-sub {
        font-size: 20px;
        font-weight: 500;
        color: #94a3b8;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="scene7-icps" data-start="0" data-duration="4" data-width="1920" data-height="1080">
      <div class="wrap">
        <div class="heading clip" id="heading" data-start="0" data-duration="4" data-track-index="1">
          Built for <span class="accent">every buyer.</span>
        </div>
        <div class="grid clip" id="grid" data-start="0" data-duration="4" data-track-index="2">
          <div class="tile">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="2" />
              <circle cx="12" cy="12" r="3" fill="#0a7cff" />
              <path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke="#fff" stroke-width="2" stroke-linecap="round" />
            </svg>
            <div class="tile-label">Robot Vacuums</div>
            <div class="tile-sub">$100–$1,500</div>
          </div>
          <div class="tile">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="none">
              <path d="M4 8h14v7a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8Z" stroke="#fff" stroke-width="2" stroke-linejoin="round" />
              <path d="M18 10h2a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-2" stroke="#fff" stroke-width="2" />
              <path d="M8 3v3M12 3v3M16 3v3" stroke="#0a7cff" stroke-width="2" stroke-linecap="round" />
            </svg>
            <div class="tile-label">Coffee Machines</div>
            <div class="tile-sub">$50–$2,000</div>
          </div>
          <div class="tile">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="none">
              <path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-9Z" stroke="#fff" stroke-width="2" stroke-linejoin="round" />
              <circle cx="16" cy="16" r="1.5" fill="#0a7cff" />
            </svg>
            <div class="tile-label">Any Home</div>
            <div class="tile-sub">Pets. Hardwood. Carpet.</div>
          </div>
          <div class="tile">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="6" width="18" height="13" rx="2" stroke="#fff" stroke-width="2" />
              <circle cx="12" cy="12.5" r="3" stroke="#0a7cff" stroke-width="2" />
              <path d="M7 6V4M17 6V4" stroke="#fff" stroke-width="2" stroke-linecap="round" />
            </svg>
            <div class="tile-label">Any Budget</div>
            <div class="tile-sub">First-timer or pro.</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const heading = document.querySelector("#heading");
        const tiles = document.querySelectorAll(".tile");

        gsap.set(heading, { opacity: 0, y: 20 });
        gsap.set(tiles, { opacity: 0, y: 30, scale: 0.8 });

        tl.to(heading, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0);
        tiles.forEach((tile, i) => {
          tl.to(tile, {
            opacity: 1,
            y: 0,
            scale: 1,
            duration: 0.5,
            ease: "back.out(1.4)",
          }, 0.5 + i * 0.15);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["scene7-icps"] = tl;
      })();
    </script>
  </body>
</html>
