<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 60px;
      }
      .search {
        width: 1100px;
        padding: 32px 40px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .search svg { flex-shrink: 0; }
      .search-text {
        color: #fff;
        font-size: 44px;
        font-weight: 500;
      }
      .cursor {
        color: #0a7cff;
        font-weight: 700;
        display: inline-block;
      }
      .sub {
        color: #94a3b8;
        font-size: 32px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="scene" data-composition-id="scene1-hook" data-start="0" data-duration="3" data-width="1920" data-height="1080">
      <div class="wrap">
        <div class="search clip" id="search" data-start="0" data-duration="3" data-track-index="1">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="#94a3b8" stroke-width="2" />
            <path d="m21 21-4.3-4.3" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
          </svg>
          <div class="search-text"><span id="typed"></span><span class="cursor" id="cursor">|</span></div>
        </div>
        <div class="sub clip" id="sub" data-start="0" data-duration="3" data-track-index="2">Three hours of searching.</div>
      </div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const typed = document.querySelector("#typed");
        const cursor = document.querySelector("#cursor");
        const sub = document.querySelector("#sub");
        const search = document.querySelector("#search");
        const QUERY = "best robot vacuum under $500";

        // Initial states
        gsap.set(search, { opacity: 0, y: 12 });
        gsap.set(sub, { opacity: 0, y: 10 });

        // Enter search bar
        tl.to(search, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" }, 0);

        // Typewriter — reveal one char at a time over 1.8s
        const letters = QUERY.split("");
        letters.forEach((ch, i) => {
          tl.call(() => { typed.textContent = QUERY.slice(0, i + 1); }, null, 0.4 + (i * (1.6 / letters.length)));
        });

        // Blinking cursor — manual 250ms toggle
        for (let i = 0; i < 12; i++) {
          tl.call(() => { cursor.style.opacity = cursor.style.opacity === "0" ? "1" : "0"; }, null, i * 0.25);
        }

        // Subtitle enters
        tl.to(sub, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.6);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-hook"] = tl;
      })();
    </script>
  </body>
</html>
