<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=block" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .word {
        font-size: 280px;
        font-weight: 900;
        color: #fff;
        letter-spacing: -0.04em;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="scene4-enough" data-start="0" data-duration="3" data-width="1920" data-height="1080">
      <div class="wrap">
        <div class="word clip" id="word" data-start="0" data-duration="3" data-track-index="1">Enough.</div>
      </div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const word = document.querySelector("#word");

        gsap.set(word, { opacity: 0, scale: 1.4 });
        tl.to(word, { opacity: 1, scale: 1, duration: 0.6, ease: "power3.out" }, 0.3);
        // Hold
        tl.to(word, { scale: 1.1, opacity: 0, duration: 0.6, ease: "power2.in" }, 2.4);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene4-enough"] = tl;
      })();
    </script>
  </body>
</html>
