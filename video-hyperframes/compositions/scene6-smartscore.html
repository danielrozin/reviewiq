<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=block" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: 1400px;
        padding: 60px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
        display: flex;
        gap: 60px;
      }
      .score-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        flex-shrink: 0;
      }
      .ring-wrap { position: relative; width: 220px; height: 220px; }
      .ring-wrap svg { transform: rotate(-90deg); }
      .ring-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .score-num {
        font-size: 88px;
        font-weight: 900;
        color: #fff;
        line-height: 1;
      }
      .score-label {
        font-size: 18px;
        font-weight: 600;
        color: #94a3b8;
        letter-spacing: 0.15em;
      }
      .source {
        font-size: 22px;
        color: #94a3b8;
        font-weight: 500;
      }
      .content-col { flex: 1; display: flex; flex-direction: column; gap: 24px; }
      .product-name {
        font-size: 36px;
        font-weight: 800;
        color: #fff;
      }
      .list-label {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.18em;
        margin-bottom: 10px;
      }
      .list-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 8px 0;
      }
      .bullet {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .item-text {
        font-size: 24px;
        color: #fff;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="scene6-smartscore" data-start="0" data-duration="5" data-width="1920" data-height="1080">
      <div class="wrap">
        <div class="card clip" id="card" data-start="0" data-duration="5" data-track-index="1">
          <div class="score-col">
            <div class="ring-wrap">
              <svg width="220" height="220" viewBox="0 0 220 220">
                <circle cx="110" cy="110" r="90" stroke="rgba(255,255,255,0.1)" stroke-width="16" fill="none" />
                <circle
                  id="ring-progress"
                  cx="110"
                  cy="110"
                  r="90"
                  stroke="#0a7cff"
                  stroke-width="16"
                  fill="none"
                  stroke-linecap="round"
                  stroke-dasharray="565.48"
                  stroke-dashoffset="565.48"
                />
              </svg>
              <div class="ring-center">
                <div class="score-num" id="score">0</div>
                <div class="score-label">SMARTSCORE</div>
              </div>
            </div>
            <div class="source">From 4,821 verified reviews</div>
          </div>
          <div class="content-col">
            <div class="product-name">Roborock S8 Pro Ultra</div>
            <div>
              <div class="list-label" style="color: #10b981;">WHAT OWNERS LOVE</div>
              <div class="list-item pro"><div class="bullet" style="background: #10b981;"></div><div class="item-text">Handles pet hair on hardwood</div></div>
              <div class="list-item pro"><div class="bullet" style="background: #10b981;"></div><div class="item-text">LiDAR mapping — no blind spots</div></div>
              <div class="list-item pro"><div class="bullet" style="background: #10b981;"></div><div class="item-text">Self-empty dock included</div></div>
            </div>
            <div>
              <div class="list-label" style="color: #f59e0b;">RECURRING ISSUES</div>
              <div class="list-item con"><div class="bullet" style="background: #f59e0b;"></div><div class="item-text">Loud on highest setting</div></div>
              <div class="list-item con"><div class="bullet" style="background: #f59e0b;"></div><div class="item-text">Carpet transition hesitation</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const card = document.querySelector("#card");
        const scoreEl = document.querySelector("#score");
        const ring = document.querySelector("#ring-progress");
        const pros = document.querySelectorAll(".list-item.pro");
        const cons = document.querySelectorAll(".list-item.con");
        const CIRC = 2 * Math.PI * 90; // 565.48

        gsap.set(card, { opacity: 0, y: 40 });
        gsap.set(pros, { opacity: 0, x: 20 });
        gsap.set(cons, { opacity: 0, x: 20 });

        // Card enters
        tl.to(card, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.1);

        // Score count + ring fill
        const scoreObj = { val: 0 };
        tl.to(scoreObj, {
          val: 92,
          duration: 1.8,
          ease: "power2.out",
          onUpdate: () => {
            const v = Math.floor(scoreObj.val);
            scoreEl.textContent = v;
            ring.setAttribute("stroke-dashoffset", String(CIRC * (1 - v / 100)));
          },
        }, 0.6);

        // Pros stagger in
        pros.forEach((el, i) => {
          tl.to(el, { opacity: 1, x: 0, duration: 0.4, ease: "power3.out" }, 1.2 + i * 0.2);
        });

        // Cons stagger in
        cons.forEach((el, i) => {
          tl.to(el, { opacity: 1, x: 0, duration: 0.4, ease: "power3.out" }, 2.4 + i * 0.2);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["scene6-smartscore"] = tl;
      })();
    </script>
  </body>
</html>
